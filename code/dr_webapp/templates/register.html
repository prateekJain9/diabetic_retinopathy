{% extends 'base.html' %}
{% block title %}Register{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-card__logo">◉</div>
    <h1 class="auth-card__title">Create account</h1>
    <p class="auth-card__sub">Start detecting diabetic retinopathy today</p>

    <form method="POST" class="auth-form" autocomplete="off">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" placeholder="Dr. Jane Doe" required>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Min. 6 characters" required minlength="6">
      </div>
      <div class="form-group">
        <label for="confirm_password">Confirm Password</label>
        <input type="password" id="confirm_password" name="confirm_password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn--full">Create Account →</button>
    </form>

    <p class="auth-card__footer">
      Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
    </p>
  </div>
</div>
{% endblock %}
